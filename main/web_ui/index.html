<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MiBeeHomeCam 仪表盘</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#FAFAFA;color:#333;font-size:14px}
.header{background:#7C3AED;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:8px}
.header h1{font-size:16px;font-weight:600}
.header .ver{font-size:12px;opacity:.7}
.main{padding:12px;max-width:600px;margin:0 auto;padding-bottom:60px}
.card{background:#fff;border-radius:8px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(124,58,237,.08)}
.card-title{font-size:13px;color:#888;margin-bottom:8px;font-weight:500}
.status-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot.rec{background:#e74c3c;animation:pulse 1s infinite}
.dot.idle{background:#bbb}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.status-text{font-size:15px;font-weight:600}
.status-text.rec{color:#e74c3c}
.status-text.idle{color:#999}
.filename{font-size:12px;color:#666;margin-top:4px;word-break:break-all}
.grid{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:480px){.grid{grid-template-columns:1fr 1fr}}
.row{display:flex;justify-content:space-between;padding:3px 0;font-size:13px}
.row .label{color:#888}
.row .val{font-weight:500;color:#333}
.bar-wrap{background:#e0e0e0;border-radius:4px;height:10px;margin:6px 0;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s}
.bar-fill.ok{background:#7C3AED}
.bar-fill.warn{background:#e67e22}
.bar-fill.crit{background:#e74c3c}
.bar-text{font-size:12px;color:#666}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #ddd;display:flex;z-index:10}
.bottom-nav a{flex:1;text-align:center;padding:10px 0;font-size:12px;color:#888;text-decoration:none}
.bottom-nav a.active{color:#7C3AED;font-weight:600}
.bottom-nav a:hover{background:#f5f5f5}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.badge.ok{background:#F3F0F6;color:#7C3AED}
.badge.err{background:#fce4ec;color:#c0392b}
.badge.info{background:#e3f2fd;color:#1565c0}
.sync{font-size:13px}
.sync.ok{color:#7C3AED}
.sync.no{color:#999}
.btn-rec{padding:6px 16px;border:none;border-radius:4px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;transition:background .15s}
.btn-rec.start{background:#7C3AED;color:#fff}
.btn-rec.start:hover{background:#5B21B6}
.btn-rec.stop{background:#e74c3c;color:#fff}
.btn-rec.stop:hover{background:#c0392b}
.btn-rec:disabled{opacity:.5;cursor:not-allowed}
.rec-actions{display:flex;gap:8px;margin-top:8px}
</style>
</head>
<body>
<div class="header">
<span>&#128247;</span>
<h1>MiBeeHomeCam <span class="ver">v0.1</span></h1>
</div>
<div class="main">

<div class="card">
<div class="status-row">
<span class="dot idle" id="recDot"></span>
<span class="status-text idle" id="recText">空闲</span>
</div>
<div class="filename" id="recFile"></div>
<div class="rec-actions" id="recActions"></div>
</div>

<div class="grid">
<div class="card">
<div class="card-title">💾 SD卡存储</div>
<div class="bar-wrap"><div class="bar-fill ok" id="sdBar" style="width:0%"></div></div>
<div class="bar-text" id="sdText">--</div>
</div>
<div class="card">
<div class="card-title">📡 WiFi状态</div>
<div class="row"><span class="label">SSID</span><span class="val" id="wfSsid">--</span></div>
<div class="row"><span class="label">RSSI</span><span class="val" id="wfRssi">--</span></div>
<div class="row"><span class="label">Channel</span><span class="val" id="wfChannel">--</span></div>
<div class="row"><span class="label">Gateway</span><span class="val" id="wfGateway">--</span></div>
<div class="row"><span class="label">IP</span><span class="val" id="wfIp">--</span></div>
</div>
</div>
<div class="grid">
<div class="card">
<div class="card-title">📷 摄像头信息</div>
<div class="row"><span class="label">型号</span><span class="val" id="camModel">--</span></div>
<div class="row"><span class="label">分辨率</span><span class="val" id="camRes">--</span></div>
</div>
<div class="card">
<div class="card-title">ℹ️ 系统信息</div>
<div class="row"><span class="label">⏱ 运行时间</span><span class="val" id="sysUp">--</span></div>
<div class="row"><span class="label">🕐 时间同步</span><span class="val" id="sysSync">--</span></div>
<div class="row"><span class="label">🕐 当前时间</span><span class="val" id="currentTime">--</span></div>
<div class="row"><span class="label">🌡 芯片温度</span><span class="val" id="chip_temp">--</span></div>
</div>
</div>

<div class="card">
<div class="card-title">☁️ NAS上传</div>
<div class="row"><span class="label">状态</span><span class="val" id="nasStatus">--</span></div>
<div class="row"><span class="label">最近上传</span><span class="val" id="nasLast">--</span></div>
<div class="row"><span class="label">队列</span><span class="val" id="nasQueue">--</span></div>
</div>

</div>

<nav class="bottom-nav">
<a href="/" class="active">&#128202; 仪表盘</a>
<a href="/config.html">&#9881; 配置</a>
<a href="/files.html">&#128193; 文件</a>
<a href="/preview.html">&#128249; 预览</a>
</nav>

<script>
function $(s){return document.getElementById(s)}

/* ---- Auth ---- */
function getPw(){return localStorage.getItem('cam_password')||''}
function setPw(p){localStorage.setItem('cam_password',p)}
function authHeaders(){var p=getPw();return p?{'X-Password':p}:{}}
function authFetch(url,opts){
 opts=opts||{};opts.headers=Object.assign({},opts.headers||{},authHeaders());
 return fetch(url,opts).then(function(r){
  if(r.status===401){setPw('');promptLogin();throw new Error('Unauthorized')}
  return r
 })
}
function promptLogin(cb){
 var p=prompt('请输入管理密码:');if(!p)return;
 fetch('/api/status',{headers:{'X-Password':p}}).then(function(r){
  if(r.ok){setPw(p);if(cb)cb()}else{alert('密码错误');promptLogin(cb)}
 })
}

/* ---- Recording Control ---- */
var _recBusy=false;
function toggleRec(){
 if(_recBusy)return;
 var v=window._lastStatus;if(!v)return;
 if(!getPw()){promptLogin(toggleRec);return}
 var action=v.recording==='recording'?'stop':'start';
 if(action==='stop'){
  if(!confirm('确定停止录制？'))return;
 }
 _recBusy=true;
 authFetch('/api/record?action='+action,{method:'POST'}).then(function(r){return r.json()}).then(function(d){
  _recBusy=false;
  if(d.ok)refresh();
  else alert('操作失败: '+(d.error||'未知错误'));
 }).catch(function(e){_recBusy=false;console.error(e)})
}

function fmtTime(s){
 var h=Math.floor(s/3600),m=Math.floor(s%3600/60);
 if(h>0)return h+'h '+m+'m';
 return m+'m';
}
function fmtSize(bytes){
 if(bytes<1024)return bytes+'B';
 if(bytes<1048576)return (bytes/1024).toFixed(1)+'KB';
 if(bytes<1073741824)return (bytes/1048576).toFixed(1)+'MB';
 return (bytes/1073741824).toFixed(2)+'GB';
}
function refresh(){
 fetch('/api/status').then(function(r){return r.json()}).then(function(d){
  if(!d.ok)return;
  var v=d.data;
  window._lastStatus=v;
  var rec=$('recDot'),rt=$('recText'),rf=$('recFile'),ra=$('recActions');
  if(v.recording==='recording'){
   rec.className='dot rec';rt.className='status-text rec';rt.textContent='录制中';
   rf.textContent=v.current_file||'';
   ra.innerHTML='<button class="btn-rec stop" onclick="toggleRec()">⏹ 停止录制</button>';
  }else{
   rec.className='dot idle';rt.className='status-text idle';rt.textContent='空闲';rf.textContent='';
   ra.innerHTML='<button class="btn-rec start" onclick="toggleRec()">⏺ 开始录制</button>';
  }
  var bar=$('sdBar'),txt=$('sdText');
  if(v.sd_total_bytes!=null&&v.sd_free_bytes!=null){
   var used=v.sd_total_bytes-v.sd_free_bytes;
   var pct=used*100/v.sd_total_bytes;
   bar.style.width=pct+'%';
   bar.className='bar-fill '+(pct>90?'crit':pct>70?'warn':'ok');
   txt.textContent='已用 '+fmtSize(used)+' / '+fmtSize(v.sd_total_bytes)+' ('+Math.round(pct)+'%)';
  }else{
   bar.style.width='0%';txt.textContent='--';
  }

  $('wfSsid').textContent=v.wifi_ssid||'--';
  $('wfRssi').textContent=v.wifi_rssi!=null?v.wifi_rssi+'dBm':'--';
  $('wfChannel').textContent=v.wifi_channel!=null?v.wifi_channel:'--';
  $('wfGateway').textContent=v.wifi_gateway||'--';
  $('wfIp').textContent=v.ip||'--';

  $('camModel').textContent=v.camera||'--';
  $('camRes').textContent=v.resolution||'--';
  $('sysUp').textContent=v.uptime!=null?fmtTime(v.uptime):'--';
  var ss=$('sysSync');
  if(v.time_synced){ss.className='sync ok';ss.textContent='\u2714 已同步'}
  else{ss.className='sync no';ss.textContent='\u2718 未同步'}
  $('currentTime').textContent=v.current_time||'--';
  var ns=$('nasStatus');
  if(v.upload_queue>=0){ns.className='val';ns.innerHTML='<span class="badge ok">正常</span>'}
  else{ns.className='val';ns.innerHTML='<span class="badge err">异常</span>'}
  $('nasLast').textContent=v.last_upload||'--';
 $('nasQueue').textContent=(v.upload_queue||0)+' 个文件';
 var ct=v.chip_temp,ce=$('chip_temp');
 ce.textContent=ct!=null?ct.toFixed(1)+' °C':'--';
 ce.style.color=ct>70?'#e74c3c':ct>55?'#e67e22':'';
 }).catch(function(e){console.error('Status fetch failed:',e)});
}
setInterval(refresh,5000);
window.onload=refresh;
</script>
</body>
</html>
